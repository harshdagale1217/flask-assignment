<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    input, textarea { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <form action="/submittodoitem" method="POST">
    <label>Item ID:</label>
    <input type="text" name="itemId" placeholder="Enter item ID" required>
    <label>Item UUID:</label>
    <input type="text" name="itemUuid" placeholder="Enter item UUID" required>
    <label>Item Hash:</label>
    <input type="text" name="itemHash" placeholder="Enter item hash" required>
    <label>Item Name:</label>
    <input type="text" name="itemName" placeholder="Enter item name" required>
    <label>Item Description:</label>
    <textarea name="itemDescription" placeholder="Enter description" rows="4" required></textarea>
    <button type="submit">Add Item</button>
  </form>
</body>
</html>
